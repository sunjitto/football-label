<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบหลังบ้าน - บริหารจัดการและพิมพ์ใบปะหน้า</title>
    <style>
        body { font-family: sans-serif; background: #eef1f5; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { color: #333; margin-top: 0; }
        .control-panel { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; align-items: center; justify-content: space-between; }
        .search-box { padding: 10px 15px; border: 1px solid #ccc; border-radius: 6px; width: 250px; font-size: 15px; }
        .btn { border: none; padding: 10px 18px; cursor: pointer; border-radius: 6px; font-size: 15px; font-weight: bold; text-decoration: none; display: inline-block; transition: all 0.2s; }
        .btn-refresh { background-color: #007bff; color: white; }
        .btn-export { background-color: #28a745; color: white; }
        .btn-sheet { background-color: #6f42c1; color: white; }
        .btn:hover { opacity: 0.9; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; }
        th, td { border: 1px solid #e0e0e0; padding: 14px; text-align: left; font-size: 15px; }
        th { background-color: #343a40; color: white; }
        tr:nth-child(even) { background-color: #f8f9fa; }
        .action-btns { display: flex; gap: 8px; }
        .btn-table { border: none; padding: 6px 12px; cursor: pointer; border-radius: 4px; font-size: 14px; font-weight: bold; color: white; }
        .btn-print { background-color: #dc3545; }
        .btn-status { background-color: #17a2b8; }
        
        .chk-col { text-align: center; width: 40px; }
        .chk-box { width: 18px; height: 18px; cursor: pointer; }
        .qty-col { text-align: center; font-weight: bold; color: #d9534f; font-size: 16px; }

        /* แถวที่พิมพ์แล้ว */
        .printed-row { background-color: #e9ecef !important; color: #6c757d; }
        .printed-text { text-decoration: line-through; opacity: 0.6; }
        .badge-printed { background-color: #28a745; color: white; padding: 3px 8px; border-radius: 20px; font-size: 12px; font-weight: bold; }

        /* 🖨️ สไตล์จัดบล็อกพิมพ์ (คลีนขาว ไม่มีมาร์ก จัดกึ่งกลางพอดีกระดาษ) */
        .print-page { display: none; }
        @media print {
            .container { display: none !important; }
            @page { size: 6in 4in landscape; margin: 0; }
            html, body { background: none; margin: 0; padding: 0; width: 6in; height: 4in; overflow: hidden; }
            
            .print-page { 
                display: flex !important; 
                justify-content: center;
                align-items: center;
                width: 6in; 
                height: 4in; 
                box-sizing: border-box; 
                position: relative;
                background: #fff;
                page-break-after: always;
            }
            
            .label-text { 
                font-family: 'Sarabun', 'Noto Sans Thai', Arial, sans-serif; 
                font-size: 20pt; 
                font-weight: normal;
                line-height: 1.6; 
                white-space: pre-line; 
                color: #000;
                width: 80%;
                text-align: left;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>📊 ระบบจัดการข้อมูลไปรษณีย์บัตร (รอพิมพ์)</h2>
        
        <div class="control-panel">
            <div>
                <input type="text" id="searchInput" class="search-box" onkeyup="searchTable()" placeholder="🔍 ค้นหาข้อมูล...">
            </div>
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <button class="btn btn-export" onclick="exportSelectedToCSV()">💾 เซฟเฉพาะที่เลือกลง Excel</button>
                <a href="https://docs.google.com/spreadsheets/" target="_blank" class="btn btn-sheet">🟢 เปิด Google Sheets</a>
                <button class="btn btn-refresh" onclick="loadData()">🔄 รีเฟรชข้อมูล</button>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th class="chk-col"><input type="checkbox" id="selectAll" class="chk-box" onclick="toggleSelectAll(this)"></th>
                    <th>ชื่อ-นามสกุล</th>
                    <th>ที่อยู่จัดส่ง</th>
                    <th>เบอร์โทรศัพท์</th>
                    <th style="width: 90px; text-align: center;">จำนวน (ใบ)</th>
                    <th style="width: 120px;">สถานะ</th>
                    <th style="width: 160px;">การจัดการ</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <tr><td colspan="7" style="text-align: center; color: #666;">กำลังโหลดข้อมูล...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="print-page">
        <div class="label-text" id="print-content"></div>
    </div>

    <script>
        const scriptUrl = "https://script.google.com/macros/s/AKfycbxVya7YlZv7bjY9slHPydvZO7MwJqy8Ein4PKYqfoz_3SwjJhLqALGLYhyVdjfzfPfUVw/exec";
        let rawData = [];
        let printedRows = JSON.parse(localStorage.getItem('printed_rows_list')) || [];

        function loadData() {
            document.getElementById('table-body').innerHTML = `<tr><td colspan="7" style="text-align: center; color: #666;">กำลังโหลดข้อมูลล่าสุด...</td></tr>`;
            document.getElementById('selectAll').checked = false;
            fetch(scriptUrl)
            .then(res => res.json())
            .then(data => {
                rawData = data.filter(item => item.name || item.address).reverse(); 
                renderTable(rawData);
            })
            .catch(err => {
                document.getElementById('table-body').innerHTML = `<tr><td colspan="7" style="text-align: center; color: red;">โหลดล้มเหลว กรุณารีเฟรชใหม่</td></tr>`;
            });
        }

        function renderTable(data) {
            let html = '';
            if(data.length === 0) {
                html = `<tr><td colspan="7" style="text-align: center; color: #999;">ไม่มีข้อมูลรอพิมพ์</td></tr>`;
            } else {
                data.forEach((item, index) => {
                    let formattedPhone = item.phone ? item.phone.toString().trim() : '';
                    if (formattedPhone && formattedPhone.length === 9 && !formattedPhone.startsWith('0')) {
                        formattedPhone = '0' + formattedPhone;
                    }

                    // 🌟 เปลี่ยนมาดึงค่าจากตัวแปรภาษาไทยคำว่า 'จำนวน' หรือ 'quantity' เพื่อความยืดหยุ่นสูง
                    let qty = item.จำนวน || item.quantity || 1;
                    const rowKey = (item.name || '') + '_' + formattedPhone;
                    const isPrinted = printedRows.includes(rowKey);

                    html += `<tr id="tr-${index}" class="${isPrinted ? 'printed-row' : ''}">
                        <td class="chk-col">
                            <input type="checkbox" class="chk-box item-chk" data-index="${index}">
                        </td>
                        <td class="${isPrinted ? 'printed-text' : ''}">${item.name || ''}</td>
                        <td class="${isPrinted ? 'printed-text' : ''}">${item.address || ''}</td>
                        <td class="${isPrinted ? 'printed-text' : ''}">${formattedPhone}</td>
                        <td class="qty-col ${isPrinted ? 'printed-text' : ''}">${qty}</td>
                        <td id="status-${index}">
                            ${isPrinted ? '<span class="badge-printed">✅ พิมพ์แล้ว</span>' : '<span style="color:#e0a800; font-weight:bold;">⏳ รอพิมพ์</span>'}
                        </td>
                        <td>
                            <div class="action-btns">
                                <button class="btn-table btn-print" onclick="printLabel('${item.name || ''}', '${item.address || ''}', '${formattedPhone}', '${rowKey}', ${index})">พิมพ์ 4x6</button>
                                <button class="btn-table btn-status" onclick="toggleStatus('${rowKey}', ${index})">สลับสถานะ</button>
                            </div>
                        </td>
                    </tr>`;
                });
            }
            document.getElementById('table-body').innerHTML = html;
        }

        function toggleSelectAll(master) {
            const checkboxes = document.querySelectorAll('.item-chk');
            checkboxes.forEach(chk => chk.checked = master.checked);
        }

        /* ระบบค้นหาแบบเรียลไทม์ */
        function searchTable() {
            const searchText = document.getElementById('searchInput').value.toLowerCase();
            const filteredData = rawData.filter(item => {
                let qtyStr = (item.จำนวน || item.quantity || 1).toString();
                return (item.name && item.name.toLowerCase().includes(searchText)) || 
                       (item.address && item.address.toLowerCase().includes(searchText)) || 
                       (qtyStr.includes(searchText)) ||
                       (item.phone && item.phone.toString().toLowerCase().includes(searchText));
            });
            renderTable(filteredData);
        }

        /* ฟังก์ชันพิมพ์ป้ายจ่าหน้าขนาดฟอนต์อ่านง่าย พอดีกระดาษ */
        function printLabel(name, address, phone, rowKey, index) {
            document.getElementById('print-content').innerHTML = `
                <div>ผู้รับ: ${name}</div>
                <div style="margin-top: 8px;">ที่อยู่: ${address}</div>
                <div style="margin-top: 8px;">โทร: ${phone}</div>
            `;
            window.print();

            if (!printedRows.includes(rowKey)) {
                printedRows.push(rowKey);
                localStorage.setItem('printed_rows_list', JSON.stringify(printedRows));
                document.getElementById(`tr-${index}`).classList.add('printed-row');
                document.getElementById(`tr-${index}`).querySelectorAll('td').forEach((td, idx) => {
                    if(idx > 0 && idx < 5) td.classList.add('printed-text');
                });
                document.getElementById(`status-${index}`).innerHTML = '<span class="badge-printed">✅ พิมพ์แล้ว</span>';
            }
        }

        /* 🌟 แก้ไขบั๊กฟังก์ชันสลับสถานะให้ทำงานได้อย่างถูกต้อง */
        function toggleStatus(rowKey, index) {
            const keyIndex = printedRows.indexOf(rowKey);
            const rowElement = document.getElementById(`tr-${index}`);
            
            if (keyIndex > -1) {
                // เปลี่ยนสถานะกลับเป็น "รอพิมพ์"
                printedRows.splice(keyIndex, 1);
                rowElement.classList.remove('printed-row');
                rowElement.querySelectorAll('td').forEach((td, idx) => {
                    if(idx > 0 && idx < 5) td.classList.remove('printed-text'); // เอาขีดฆ่าออก
                });
                document.getElementById(`status-${index}`).innerHTML = '<span style="color:#e0a800; font-weight:bold;">⏳ รอพิมพ์</span>';
            } else {
                // เปลี่ยนสถานะเป็น "พิมพ์แล้ว"
                printedRows.push(rowKey);
                rowElement.classList.add('printed-row');
                rowElement.querySelectorAll('td').forEach((td, idx) => {
                    if(idx > 0 && idx < 5) td.classList.add('printed-text'); // ใส่ขีดฆ่า
                });
                document.getElementById(`status-${index}`).innerHTML = '<span class="badge-printed">✅ พิมพ์แล้ว</span>';
            }
            localStorage.setItem('printed_rows_list', JSON.stringify(printedRows));
        }

        function exportSelectedToCSV() {
            const checkedBoxes = document.querySelectorAll('.item-chk:checked');
            if (checkedBoxes.length === 0) {
                return alert("กรุณาติ๊กเลือกรายการที่ต้องการเซฟลง Excel ก่อนครับ");
            }
            let csvContent = "\uFEFF" + "ชื่อ-นามสกุล,ที่อยู่,เบอร์โทร,จำนวนใบ\n";
            checkedBoxes.forEach(chk => {
                const index = chk.getAttribute('data-index');
                const item = rawData[index];
                if(item) {
                    let phoneStr = item.phone ? item.phone.toString().trim() : '';
                    if (phoneStr && phoneStr.length === 9 && !phoneStr.startsWith('0')) {
                        phoneStr = '0' + phoneStr;
                    }
                    let qty = item.จำนวน || item.quantity || 1;
                    csvContent += `"${(item.name || '').replace(/"/g, '""')}","${(item.address || '').replace(/"/g, '""')}","\t${phoneStr}","${qty}"\n`;
                }
            });
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.setAttribute("href", URL.createObjectURL(blob));
            link.setAttribute("download", `ข้อมูลจ่าหน้า_${new Date().toLocaleDateString('th-TH')}.csv`);
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
        }

        window.onload = loadData;
    </script>
</body>
</html>
